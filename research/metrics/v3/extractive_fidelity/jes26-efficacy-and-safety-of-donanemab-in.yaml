  - claim_id: "C09"
    faithful: false
    infidelity_type: "polarity_inversion"
    paper_quote: "After completing donanemab treatment, the rate of amyloid reaccumulation was comparable to that seen with the natural history of the disease [16,17]."
    note: "The first three sub-claims of C09 (increasing 154-week treatment effect, 29% lower CDR-G progression risk for early-start vs delayed-start, treatment-course-completion framing) are faithfully supported by fulltext lines 392-406. However, the final clause 'amyloid clearance was maintained after treatment completion' has no supporting Sources quote and directly inverts the paper's actual Discussion statement (fulltext lines 421-423, quoted above): the paper says amyloid REACCUMULATES after donanemab is stopped, at a rate comparable to natural, untreated disease progression -- i.e., clearance was NOT maintained, it eroded at a normal (non-accelerated) pace. 'Maintained' and 'reaccumulates' are materially opposite claims about the post-treatment biomarker trajectory, regardless of the pace qualifier. Definitive verdict: the paper supports REACCUMULATION, not maintenance of clearance. This is a polarity_inversion, and also an unsupported_addition in the sense that no Sources bullet in C09 cites this clause at all -- the inversion is the dominant defect."
  - claim_id: "C10"
    faithful: true
    note: "Line 337-344 confirms 'CDR-SB, was 28.2% and 30.8% in the EU-eligible population with and without the hybrid imputation method respectively, compared to 28.9% in the overall TRAILBLAZER-ALZ 2 population'; line 221/275 area confirms 'an 18% to 28% slowing of disease progression... at week 76'; Table 2 (lines 360-364) confirms all five original-vs-conservative rows (iADRS 2.52 vs 2.32; CDR-SB -0.73 vs -0.67; ADAS-Cog13 -1.64 vs -1.37; ADCS-iADL 1.25 vs 1.24; MMSE 0.73 vs 0.61). All numbers match exactly."
infidelities:
  - claim_id: "C09"
    type: "polarity_inversion"
    paper_quote: "After completing donanemab treatment, the rate of amyloid reaccumulation was comparable to that seen with the natural history of the disease [16,17]."
    note: "C09's Statement asserts 'amyloid clearance was maintained after treatment completion,' but the paper's Discussion (fulltext lines 421-423) states the opposite: amyloid REACCUMULATES after treatment stops, at a pace comparable to the disease's natural (untreated) history. Reaccumulation at a natural pace is still reaccumulation, not maintenance of clearance -- these are materially different claims about biomarker durability post-treatment. No Sources quote in the claim covers this clause, indicating it was added without textual support and inverts the paper's actual finding."
