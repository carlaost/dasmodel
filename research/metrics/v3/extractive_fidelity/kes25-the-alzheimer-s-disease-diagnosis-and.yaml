claims:
  - claim_id: "C01"
    faithful: true
    note: "Fulltext line 539/558 and abstract (line 90) confirm Lumipulse p-tau217 AUC 0.947 (95% CI 0.919-0.974) in the CSF cohort (n=257, defined by CSF Aβ42/Aβ40); Table 2 row matches exactly."
  - claim_id: "C02"
    faithful: true
    note: "Fold-changes (6.7 vs 4.2 in CSF, §3.2.1 line 542-544; 3.9 vs 3.2 in PET, line 526-528) and indeterminate zone (19.4% vs 23.4%, Table 3 line 694) all match. The 'so Lumipulse was selected as the clinical assay' clause is explicitly supported by Discussion text (line 903-908): 'The Lumipulse (Fujirebio) plasma p-tau217 assay consistently showed higher performance than the ALZpath (Quanterix) assay... in terms of having both higher median fold-change... and lower proportion of cases with indeterminate results... will be used as the clinical cut-points.'"
  - claim_id: "C03"
    faithful: true
    note: "§3.4.1 (lines 592-598) verbatim: cut-points 0.153/0.422 pg/mL, 97% specificity (95% sensitivity fixed), 19.4% intermediate zone, NPV 90.4% (80.6-95.0), PPV 97.6% (93.2-99.5), overall accuracy 94.7% for definitive classifications. All numbers match exactly."
  - claim_id: "C04"
    faithful: true
    note: "§3.4.2 (lines 716-722) confirms intermediate zone 34.2% when CSF-derived cut-points applied to PET cohort, NPV 88.9% (65.3-98.6), PPV 90.6% (75.0-98.0), accuracy 90.0%; Table 2 (line 558) confirms PET AUC 0.879 (0.778-0.980). All match."
  - claim_id: "C05"
    faithful: true
    note: "Table 2 (lines 557-562) confirms Age+sex+Lumipulse AUC 0.950 vs Lumipulse alone 0.947, and text (line 542-543) states this is 'not significantly different to Lumipulse p-tau217 alone'; AIC<20 threshold matches Methods (line 353): 'AIC reduction of 20 or more deemed significant'. DeLong methodology confirmed (lines 346-351)."
  - claim_id: "C06"
    faithful: true
    note: "§3.6 (lines 773-790) confirms the four experiments, n=10 per experiment (40 participants total, line 324), median relative change not exceeding ±10% threshold (line 782-784), with significant Friedman results for ALZpath Experiment 1 (P=0.007, line 746) and Lumipulse Experiment 3 (P=0.0047, line 786-788), consistent with claim's caveat."
  - claim_id: "C07"
    faithful: true
    note: "§3.7 (lines 767-772) confirms four kit lots (v1: 4128, 5066; v2: 5084, 5086), n=30 subset, rho>0.95 correlations, and '3 out of 30 individuals had discordant classifications across lots... discordances did not occur due to the same kit lot' -- exact match."
  - claim_id: "C08"
    faithful: true
    note: "§3.8 (lines 778-782) confirms n=10 samples, rho=0.998 correlation between -20C (Bio-Freeze) and -80C storage/transport, with no systematic bias -- exact match."
  - claim_id: "C09"
    faithful: true
    note: "§3.5 (lines 756-767) confirms 58 CN-CKD individuals, 5.1% (3/58) above upper cut-point, 43.1% (25/58) in intermediate zone, CKD-1 median 0.119 pg/mL rising to CKD-4 0.213 pg/mL (monotonic across stages), and 'no statistically significant association between p-tau217 and CN-CKD... after adjustment for age, sex, or BMI' -- exact match."
  - claim_id: "C10"
    faithful: true
    note: "§3.4.1 sensitivity analysis (lines 668-702) confirms Malmö cut-points 0.22/0.34 pg/mL, sensitivity 91.4% vs 95%, NPV 87.1% vs 90.5% at 62.7% prevalence (line 453 confirms 161/257=62.7%), and accuracy 88.8-91.5% (Malmö) vs 93.3-94.0% (within-cohort). All numbers match exactly."
