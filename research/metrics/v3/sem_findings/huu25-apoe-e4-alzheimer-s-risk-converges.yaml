    note: "This is a partial-replication nuance (not full concordance) that IS captured honestly in related_work.md and is consistent with C08's careful 'including shared PLP1 and OPALIN' (not 'full overlap') phrasing in claims.md -- a good-faith detail, not lost in compilation."
