claims:
  - claim_id: C01
    evidence_relevance: {relevant: true, note: "Table 2 (evidence/tables/table2.md) and abstract both report Lumipulse AUC 0.947 (0.919-0.974) in the CSF cohort exactly as stated; verified directly against paper.pdf (§Results abstract line, §3.3.1, Table 2 row)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A correctly powered ROC analysis on the same cohort/definition yielding a materially different AUC or non-overlapping CI' is a rerun of the identical pipeline/data, not an independent test -- it cannot fail without the paper's own numbers changing. A real precommitted test would be prospective replication in a held-out cohort."}
    scope_calibration: {verdict: calibrated, note: "Statement is explicitly scoped to 'the CSF cohort (n=257, AD status defined by CSF Aβ42/Aβ40 ratio ≤0.065)' -- matches exactly what was tested, no generalization to other cohorts or AD definitions."}
    novelty: {verdict: incremental, note: "related_work.md RW05 (Pilotto/Warmenhoven/Schindler) already establishes head-to-head plasma p-tau217 assays achieve comparably high AUCs; this is a confirmatory result in a new UK cohort using a CSF-only AD definition, not a novel diagnostic finding for the field."}
  - claim_id: C02
    evidence_relevance: {relevant: true, note: "§3.2.1/§3.2.2 fold-change values (6.7/4.2, 3.9/3.2) and Table 3 intermediate-zone percentages (19.4/23.4) verified verbatim in paper.pdf; §3.3.1 confirms 'DeLong test >0.05 for pairwise post hoc comparisons' backing the 'statistically indistinguishable AUCs' clause."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Head-to-head analysis on the same cohorts showing ALZpath with equal/larger fold-change AND equal/lower indeterminate proportion' reruns the same data/pipeline; it is the direct negation of the observed comparison, not an independently falsifiable prediction."}
    scope_calibration: {verdict: calibrated, note: "Claim is carefully hedged ('highly correlated and statistically indistinguishable AUCs') before asserting the fold-change/indeterminate-zone advantage, matching what the data show; the 'so Lumipulse was selected as the clinical assay' clause is a stated operational decision, not an overreaching accuracy claim."}
    novelty: {verdict: incremental, note: "related_work.md RW04 (Ashton GBSC Round Robin) already documents systematic cross-assay bias and higher Lumipulse fold-change; this claim applies that known phenomenon to justify assay selection in this specific study, rather than discovering the bias itself."}
  - claim_id: C03
    evidence_relevance: {relevant: true, note: "Table 3 (evidence/tables/table3.md) and §3.4.1 exactly match the stated cut-points (0.153/0.422), sensitivity/specificity (95/97), intermediate zone (19.4%), NPV (90.4%, 80.6-95.0), PPV (97.6%, 93.2-99.5), and accuracy (94.7%)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Recomputation on the same cohort yielding materially different cut-points/metrics' is a rerun of the same derivation procedure on the same data, not an independent test -- cut-point derivation is deterministic given the fixed sensitivity/specificity targets, so this criterion cannot meaningfully fail."}
    scope_calibration: {verdict: calibrated, note: "Explicitly restricted to 'the CSF derivation cohort'; Interpretation notes these are cut-points 'adopted for' a specific NHS lab and trial, framed as an operational decision rather than a universal clinical threshold claim."}
    novelty: {verdict: incremental, note: "related_work.md RW03 (Arranz et al. 2024) already reports closely comparable Lumipulse cut-points (0.186/0.388 pg/mL, 95% sens/spec, 19% indeterminate) using a near-identical CSF definition; this claim's own related_work notes it 'aligns with' that prior derivation -- a corroboration in a new cohort, not a new finding."}
  - claim_id: C04
    evidence_relevance: {relevant: true, note: "§3.4.2 and Table 3 (amyloid PET validation) confirm intermediate zone 34.2%, NPV 88.9% (65.3-98.6), PPV 90.6% (75.0-98.0), accuracy 90.0%, and Table 2 confirms PET AUC 0.879 (0.778-0.980), all verified in paper.pdf."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Application to the same PET cohort yielding intermediate proportion ≤20% or materially different NPV/PPV/accuracy' reruns the identical fixed cut-points on the identical fixed dataset -- the outcome is already determined by data in hand, not an independent prospective test."}
    scope_calibration: {verdict: calibrated, note: "Restricted to applying CSF-derived cut-points to 'the independent amyloid PET cohort (n=76)'; Interpretation appropriately attributes the larger indeterminate zone to known PET/CSF discordance (5-14%, confirmed in Discussion, paper.pdf line ~843) rather than overclaiming assay failure."}
    novelty: {verdict: incremental, note: "The general phenomenon of externally-derived cut-points performing worse when transported to a different AD-ascertainment modality is expected and partly foreshadowed by RW02 (Figdore) using PET-based cut-points; this claim is a specific empirical instance of that known generalization-gap issue, not a new mechanism."}
  - claim_id: C05
    evidence_relevance: {relevant: true, note: "Table 2 rows (Age+sex+Lumipulse 0.950 vs Lumipulse 0.947; Age+sex+ALZpath 0.946 vs ALZpath 0.940) and §3.3.1/§3.3.2 'not significantly different' language verified in paper.pdf; the AIC<20 threshold is explicitly defined in Methods (§2.6, 'AIC reduction of 20 or more deemed significant')."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A DeLong test showing significant AUC improvement or AIC reduction ≥20 from adding these covariates in the same models' is a rerun of the identical statistical test on the identical dataset -- the answer is already fixed by data already collected, not a new prospective test."}
    scope_calibration: {verdict: calibrated, note: "Claim is narrowly stated as a lack-of-improvement finding within 'these covariates' and 'either cohort' as tested, without generalizing to claim covariates are never useful for AD diagnosis broadly."}
    novelty: {verdict: incremental, note: "That plasma p-tau217 dominates simple demographic covariates for AD discrimination is a well-established pattern in the broader biomarker literature (cf. RW05 baseline comparisons); this is a confirmatory covariate-adjustment check standard to diagnostic-accuracy papers, not a novel insight."}
  - claim_id: C06
    evidence_relevance: {relevant: true, note: "§3.6 verified verbatim: 'the median relative change across conditions did not exceed the ±10% threshold' and the Experiment 3 P=0.0047 Friedman result; Figure 2 and Tables S10/S12 are correctly cited (S-tables not in local PDF but their content is quoted in main text, consistent with evidence/README.md's disclosure)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A handling condition producing median change >±10% on either assay' is checkable only by re-examining the same four already-run experiments; it doesn't specify a new/independent handling condition or cohort that would count as a genuine precommitted test."}
    scope_calibration: {verdict: calibrated, note: "Statement is precise about which four experiments (pre-centrifugation RT/2-8C, post-centrifugation, freeze-thaw) and about the caveat that individual significant differences existed (ALZpath Exp1, Lumipulse Exp3) even though medians stayed within threshold -- does not overclaim blanket robustness."}
    novelty: {verdict: incremental, note: "related_work.md RW08 (SABB/GBSC guidelines, Kurz/Ashton/Verberk/Gouda) already characterizes pre-analytical handling effects on blood AD biomarkers; this claim extends the ±10% threshold framework (itself imported from RW08) to two specific assays and adds new conditions (2-week -20C storage), an incremental extension rather than a new phenomenon."}
  - claim_id: C07
    evidence_relevance: {relevant: true, note: "§3.7 verified verbatim: 'rho > 0.95' across kit lots and 'Three out of 30 individuals had discordant classifications across lots ... discordances did not occur due to the same kit lot' exactly matches the Statement."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A kit-lot comparison showing rho ≤0.95 or systematic Passing-Bablok deviation' can only be evaluated by rerunning the same n=30-sample lot comparison already performed -- no independent lot set or cohort is proposed."}
    scope_calibration: {verdict: calibrated, note: "Explicitly scoped to 'a subset of n=30 CSF-cohort samples' and the four specific named lots tested; Interpretation is appropriately hedged ('likely stable ... over the trial's recruitment period') rather than claiming permanent lot-invariance."}
    novelty: {verdict: incremental, note: "Lot-to-lot reproducibility testing is a standard analytical-validation step for any clinical immunoassay rollout (motivated by RW09's FDA clearance context); demonstrating rho>0.95 here is expected assay-validation housekeeping, not a novel scientific finding."}
  - claim_id: C08
    evidence_relevance: {relevant: true, note: "§3.8 verified verbatim: 'an excellent correlation was observed ... (rho = 0.998) and there was no systematic bias' matches the Statement exactly."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A comparison of the two transport conditions showing rho materially below 0.998 or a systematic bias' can only be assessed by re-examining the same n=10 paired samples already tested -- not an independently repeatable prospective claim."}
    scope_calibration: {verdict: calibrated, note: "Narrowly scoped to 'In 10 samples' and the specific -20C Bio-Freeze vs -80C comparison; Interpretation correctly frames this as enabling a specific trial logistics choice rather than a general cold-chain claim."}
    novelty: {verdict: incremental, note: "This is a small (n=10) logistics-validation experiment building directly on RW08's pre-analytical stability framework; useful operationally for the ADAPT trial but not a new biological or diagnostic finding."}
  - claim_id: C09
    evidence_relevance: {relevant: true, note: "§3.5 verified verbatim: 5.1% (3/58) above upper cut-point, 43.1% (25/58) in intermediate zone, CKD-1 median 0.119 pg/mL, CKD-4 median 0.213 pg/mL, and 'no statistically significant association between p-tau217 and CN-CKD ... after adjustment for age, sex, or BMI' all match the Statement."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A significant independent association of CKD with elevated p-tau217 to AD-positive levels after covariate adjustment, or a materially different intermediate/high proportion in the same cohort' reruns the identical n=58 dataset/model; it is the negation of the already-observed non-significant association, not a new prospective test in an independent CKD cohort."}
    scope_calibration: {verdict: calibrated, note: "Statement is precise: elevates into intermediate zone (43.1%) 'but not typically to AD-positive levels' (only 5.1% above upper cut-point), and explicitly notes the non-significant covariate-adjusted association -- an appropriately hedged, non-overclaiming characterization matching the data."}
    novelty: {verdict: incremental, note: "related_work.md RW07 (Bornhorst et al. 2025) already reports CKD elevates plasma p-tau217; this claim's own Interpretation says it 'confirms elevation into the intermediate zone' -- explicitly a confirmatory extension of a prior finding in a new (ADPKD) cohort, not a de novo discovery."}
  - claim_id: C10
    evidence_relevance: {relevant: true, note: "§3.4.1 Malmö sensitivity analysis verified verbatim: sensitivity 91.4% (external) vs 95% (within-cohort), accuracy 88.8-91.5% (Malmö) vs 93.3-94.0% (within-cohort); NPV figures (87.1% vs 90.5%... note the claim states 90.5% while Table 3/§3.4.1's within-cohort NPV is 90.4%, a minor rounding discrepancy)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'An analysis showing external Malmö cut-points match/exceed within-cohort cut-points on the same cohort' is a rerun of the same sensitivity analysis already performed on the same fixed dataset -- not an independent prospective test of generalizability in a new population."}
    scope_calibration: {verdict: calibrated, note: "NPV figures (87.1% vs 90.5%) are the exact wording of the paper's own §3.4.1 running-text sensitivity-analysis sentence (verified in paper.pdf: '...the NPV was lower (87.1% vs. 90.5%) at 62.7% prevalence...'); this differs by 0.1pp from Table 3's rounded 90.4%, but that is a pre-existing minor internal inconsistency in the source paper itself (running text vs table), faithfully reproduced -- not an ARA over-claim."}
    novelty: {verdict: incremental, note: "This is an internal sensitivity/robustness analysis (own cohort-derived vs. externally-imported cut-points) standard to biomarker cut-point papers; RW01 (Palmqvist/Malmö) supplies the comparator cut-points being tested against, so the finding is a comparison exercise rather than a novel discovery."}
