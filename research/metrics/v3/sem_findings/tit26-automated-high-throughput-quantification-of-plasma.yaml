claims:
  - claim_id: C01
    evidence_relevance: {relevant: true, note: "Table 2 (Elecsys p-tau217 row: AUC 0.939 0.895-0.969, cut-off 0.371, sens 92.2%, spec 89.2%) and Figure 2 ROC curves directly and exactly support every number in the Statement; verified against paper.pdf p.5-6."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'AUC CI overlapping chance or well below 0.90 ... in this cohort at this cut-off' is a negation of the observed result computed on the same single retrospective cohort, not an independent/external validation (paper explicitly lacks cross-validation, per Discussion 'Limitations')."}
    scope_calibration: {verdict: calibrated, note: "Interpretation explicitly caveats 'excellent reflects AUC > 0.93 in this single cohort, not external validation' -- matches the paper's own Limitations section (single-centre, no cross-validation in an independent cohort)."}
    novelty: {verdict: incremental, note: "p-tau217 AUC>0.9 for AD discrimination is already well established (RW01 pooled meta-analysis AUC 0.911; RW04 head-to-head AUC 0.91-0.96 for other automated/research p-tau217 assays). This study's delta is demonstrating equivalent performance specifically on the Roche Elecsys automated platform, not a new biological or diagnostic finding."}
  - claim_id: C02
    evidence_relevance: {relevant: true, note: "Table 2 both p-tau217 rows and the DeLong p=0.485 text quote (verified verbatim in paper.pdf p.5: 'comparable discriminatory performance between the two p-tau217 assays (p = 0.485)') support the Statement's numbers exactly."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "A significant DeLong result is the direct negation of the same same-cohort, same-pipeline comparison already run -- no independent cohort/test is proposed."}
    scope_calibration: {verdict: over_claim, note: "'Performs comparably' is asserted purely from a non-significant DeLong test on overall AUC (p=0.485), which is failure-to-reject-null, not statistical proof of equivalence (no equivalence margin was pre-specified). More importantly, Table 2 shows the two assays' operating characteristics at their respective optimal cut-offs actually diverge notably -- Elecsys: sens 92.2%/spec 89.2% vs Lumipulse: sens 85.4%/spec 96.2% -- a ~7-point swing in both directions that 'comparable' glosses over. The claim is calibrated for AUC but over-claims for clinical interchangeability."}
    novelty: {verdict: incremental, note: "Cross-platform p-tau217 comparability is a known theme (RW04, RW13); this is a new assay pairing (Elecsys vs Lumipulse) but not a new phenomenon."}
  - claim_id: C03
    evidence_relevance: {relevant: true, note: "Table 2 (Elecsys p-tau181 row, AUC 0.903) and the exact DeLong p=0.043 quote (verified verbatim in paper.pdf p.5) support the Statement."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Non-significant DeLong test or higher p-tau181 AUC' is the direct negation of the already-run same-data comparison."}
    scope_calibration: {verdict: over_claim, note: "The paper reports at least 9 DeLong-type AUC comparisons in this study (217 vs 217: p=0.485; 181 vs 217: p=0.043; four APOE-addition tests: p=0.010, 0.02, 0.101, 0.121; two Ab42/40-adjustment tests: p=0.058, 0.322; Lumipulse/Ab42 vs Elecsys217: p=0.320) with no stated correction for multiple comparisons anywhere in the Statistical analysis section. p=0.043 is the least robust of the two 'significant' results and would not survive even a simple Bonferroni correction (0.043 x 9 = 0.387). 'Significantly outperforms' overstates the robustness of this single uncorrected borderline p-value."}
    novelty: {verdict: incremental, note: "p-tau217 > p-tau181 is already established broadly (RW01, RW05); Interpretation itself states this is 'now shown within a single platform,' i.e. an extension not a new finding."}
  - claim_id: C04
    evidence_relevance: {relevant: true, note: "Table 2 (Elecsys p-tau217+APOE-ε4 row, AUC 0.970) and Table 3 (11.0% intermediate) and the exact p=0.02 / 20.0%->11.0% quotes (verified verbatim in paper.pdf p.6) support the Statement."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "Same-cohort logistic-regression AUC comparison; a non-significant result is the direct negation of what was already computed, no independent test proposed."}
    scope_calibration: {verdict: over_claim, note: "Same multiple-comparisons issue as C03: p=0.02 is one of 9 uncorrected DeLong-family tests in this study; 0.02 x 9 = 0.18, which would not survive Bonferroni correction. The Statement presents this as a clean, significant improvement without acknowledging the multiplicity of tests run across the paper (Table 2 alone reports 6 different AUC-vs-AUC or AUC-vs-baseline comparisons)."}
    novelty: {verdict: incremental, note: "APOE-ε4 improving p-tau-based AD discrimination is already documented (Additional-citations refs 21-24: Cooper, Contreras, Cody); this paper's delta is doing so with blood-based (not genotyped) APOE-ε4 proteotyping on the Elecsys platform specifically."}
  - claim_id: C05
    evidence_relevance: {relevant: true, note: "Table 2/3 rows for Lumipulse p-tau217, /Ab42, /(Ab42/Ab40) and the exact p=0.058/p=0.322 and 11.9%/10.0%/10.5% quotes (verified verbatim in paper.pdf p.7 and p.9-10) support the Statement precisely."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "A significant AUC gain would be the direct negation of the same-cohort comparison already computed; no independent replication cohort is proposed."}
    scope_calibration: {verdict: calibrated, note: "This is a genuine embedded null result (p=0.058, p=0.322, i.e. AUC gain not statistically significant) and the ARA labels it correctly as 'adds little' / 'limited added value' rather than dressing it up as a positive finding -- honest calibration, the one place in this ARA where a non-significant p-value is NOT oversold."}
    novelty: {verdict: incremental, note: "Motivated directly by RW06 (Lehmann et al., proposing p-tau217/Ab42 ratios); this study's contribution is a negative/null replication in a new cohort, not a new hypothesis."}
  - claim_id: C06
    evidence_relevance: {relevant: true, note: "Table 3 rows and the exact '19.9% (37/186)' quote (verified verbatim in paper.pdf p.5-6) support all three percentages and cut-offs in the Statement."}
    falsifiability: {criteria_present: true, verdict: trivial, note: "'Recomputing the grey-zone proportions from the stated cut-offs and cohort and getting materially different values' is close to tautological -- given the same fixed cut-offs and the same fixed cohort, the proportion is a deterministic count, not an empirical test of a hypothesis. It confirms internal arithmetic consistency rather than testing a claim that could plausibly turn out otherwise."}
    scope_calibration: {verdict: calibrated, note: "Purely descriptive report of thresholds and proportions from Table 3; Interpretation appropriately frames 19.9% against the external BBM-workgroup 15-20% benchmark (RW08) without overreaching."}
    novelty: {verdict: incremental, note: "Two-cut-off grey-zone methodology and its 15-20% acceptable-range benchmark are imported from RW08; this claim supplies new empirical proportions for these three specific assays, not a new method."}
  - claim_id: C07
    evidence_relevance: {relevant: true, note: "Figure 1 panels A/B directly match the Statement's rs=0.88, slope 1.363 (1.251-1.484), intercept 0.113 (0.098-0.133), and Bland-Altman 58.7% mean / -27.2% to 144.6% LoA -- verified verbatim in paper.pdf p.5 and figure1.md on-plot labels."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Slope~1 and intercept~0, or weak correlation' is the negation of the same 181-sample paired method-comparison already run; a new lab re-running the same two assays on the same 181 samples would not be an independent test."}
    scope_calibration: {verdict: calibrated, note: "Statement carefully separates correlation (strong, rs=0.88) from agreement (poor, up to 59% relative difference) rather than conflating the two -- an accurate and appropriately nuanced framing that matches a common pitfall in method-comparison literature (high correlation != interchangeability)."}
    novelty: {verdict: novel, note: "This appears to be the first reported head-to-head Passing-Bablok/Bland-Altman comparison of Elecsys vs Lumipulse p-tau217 specifically (related_work.md's RW04/RW13 cover different assay pairs); the paper itself frames certified reference materials as still-needed (i.e., this delta is new)."}
  - claim_id: C08
    evidence_relevance: {relevant: true, note: "The exact 'p < 0.001, β=-0.267' and 'n=69, median 2.1 years ... p=0.07' quotes are verified verbatim in paper.pdf p.7-8 (Influence of clinical cofactors / Cognitive decline sections)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'No association ... or interaction firmly null/opposite' is a negation of the same regression already run on the same 69-patient longitudinal subset; no independent replication cohort proposed."}
    scope_calibration: {verdict: calibrated, note: "The Statement itself labels the decline-trend finding 'non-significant trend' (p=0.07, n=69) rather than 'significant' -- this is the correct honest treatment of a p=0.07 result, and Interpretation explicitly calls it 'exploratory ... not significant.' This is the ARA doing exactly what the task brief warns against elsewhere avoiding: NOT dressing up a null/marginal result as supported."}
    novelty: {verdict: incremental, note: "Longitudinal p-tau217/cognitive-decline associations are already reported (Additional-citations refs 31-34); this is a small (n=69), MoCA-only, non-significant replication attempt, explicitly flagged in the paper's own Limitations as underpowered/exploratory."}
  - claim_id: C09
    evidence_relevance: {relevant: true, note: "The exact multi-cofactor null-result quote and the '21 with eGFR<60, none <30' quote are verified verbatim in paper.pdf p.8."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'A significant association (p<0.05) with any of these cofactors' is the negation of the same regression on the same cohort; not an independent test, though it is a well-posed, genuinely falsifiable statement (five separate coefficients, each individually checkable)."}
    scope_calibration: {verdict: calibrated, note: "This is a claim that is explicitly a set of null results and is presented as such (Status: supported = 'no significant association was found', not spun as evidence of anything positive). Interpretation appropriately attributes the renal-function null to the cohort's low proportion of advanced CKD (21 with eGFR<60, none <30) rather than over-generalizing to 'p-tau217 is unaffected by renal function in general.'"}
    novelty: {verdict: incremental, note: "Renal-function/small-vessel-disease confounding of plasma p-tau is an established open question (RW10, Additional-citations refs 26,29-31); this supplies a new (null) data point for Elecsys p-tau217 specifically, in a cohort with limited CKD severity."}
  - claim_id: C10
    evidence_relevance: {relevant: true, note: "The exact CV-range and LLOQ/linearity quotes are verified verbatim in paper.pdf p.5 (Analytical performance section)."}
    falsifiability: {criteria_present: true, verdict: real_precommitted, note: "Unlike the clinical-cohort claims, analytical precision/linearity/LLOQ are measured via a standardized, repeatable CLSI EP15-A3 protocol (5 measurements/day x 5 non-consecutive days) using commercial QC material independent of the patient cohort. A different lab repeating this protocol with the same reagent lots is a genuinely independent, pre-committable verification, not a same-data rerun."}
    scope_calibration: {verdict: calibrated, note: "Plainly descriptive analytical-validation numbers; Interpretation appropriately notes this 'supports routine use' without over-extending to clinical-outcome claims, and evidence_basis honestly flags that the full concentration-stratified data live in a Supplemental Table not provided to the compiler."}
    novelty: {verdict: incremental, note: "This is routine, mandated analytical validation (CLSI EP15-A3) for any new RUO assay -- necessary reporting, not a novel scientific finding; precision is stated to be 'consistent with' other platforms (SIMOA, MSD, CLEIA)."}
  - claim_id: C11
    evidence_relevance: {relevant: true, note: "The '15 A+T-N-, 1 other; p<0.001' and '62.5%/37.5%' quotes are verified verbatim in paper.pdf p.7 (Discordant CSF biomarker profiles section)."}
    falsifiability: {criteria_present: true, verdict: post_hoc_inversion, note: "'Uniform plasma p-tau217 in discordant cases, or a large cut-off shift on reclassification' is the negation of the same-cohort sensitivity analysis already run (Supplementary Table 5, not provided); not an independent replication."}
    scope_calibration: {verdict: calibrated, note: "Status and Interpretation both explicitly flag this as exploratory/sensitivity-analysis territory ('exploratory findings', 'cautious interpretation') for a small n=16 subgroup -- appropriately hedged, matches the paper's own exploratory framing."}
    novelty: {verdict: incremental, note: "Discordant A+T-N- CSF profiles and their relationship to plasma tau are already discussed conceptually in Milà-Alomà et al. (Additional-citations ref 52); this supplies a small, Elecsys-specific empirical data point rather than a new mechanism."}
compilation_fidelity_samples:
  - fact: "Elecsys p-tau217 AUC 0.939 (0.895-0.969), cut-off 0.371 pg/mL, sensitivity 92.2% (85.3-96.6%), specificity 89.2% (80.4-94.9%) (C01)"
    pdf_location: "paper.pdf p.5-6, Table 2 row 1 and Results text 'Optimal cut-off values were 0.371 pg/mL for Elecsys p-tau217'"
    captured_in_ara: true
    note: "Exact match between paper.pdf, evidence/tables/table2.md, and claims.md C01 Sources -- no rounding or transcription drift."
  - fact: "DeLong test Elecsys p-tau217 vs Lumipulse p-tau217: p = 0.485 (C02)"
    pdf_location: "paper.pdf p.5, 'The DeLong test showed comparable discriminatory performance between the two p-tau217 assays (p = 0.485)'"
    captured_in_ara: true
    note: "Verbatim match; correctly captured as a non-significant same-data comparison, not inflated into a stronger equivalence claim in the raw evidence tables (the over-claim risk is in the claims.md prose, not the digitization)."
  - fact: "Two internally-inconsistent values for the Elecsys p-tau217 baseline grey-zone proportion: Table 3 states 19.9% (37/186) while the running Results/Discussion text (p.6, p.9) twice states 'from 20.0% to 11.0%' for the same baseline-to-+APOE comparison"
    pdf_location: "paper.pdf Table 3 (p.7, '19.9%') vs Results p.6 and Discussion p.9 ('20.0%')"
    captured_in_ara: true
    note: "The ARA faithfully reproduces both source numbers as printed (C04 Sources cites '20.0% to 11.0%'; C06/table3.md cites '19.9% (37/186)') without silently reconciling them -- correct provenance-preserving behavior -- but neither claims.md nor evidence/tables/table3.md flags that these are two different numbers for what should be the same quantity. A reader of C04 alone would not know Table 3 prints 19.9% for the identical baseline figure. Minor internal-consistency gap in the compiled ARA, inherited from an unflagged inconsistency in the source paper."
  - fact: "Table 2 Elecsys p-tau181 row shows an apparently transposed PPV/NPV confidence interval: PPV 88.9% (91.0-94.3%) and NPV 93.0% (73.4-90.1%), where the CI ranges are implausible for their point estimates (91.0-94.3% is above the 88.9% point estimate; 73.4-90.1% straddles below the 93.0% point estimate)"
    pdf_location: "paper.pdf p.6, Table 2, Elecsys p-tau181 row"
    captured_in_ara: true
    note: "evidence/tables/table2.md explicitly calls this out in its own header note ('an apparently transposed NPV CI ... reproduced as printed') -- good-faith preservation of a source typographic error rather than silent 'correction,' and the anomaly is disclosed rather than hidden."
  - fact: "Analytical precision (CV) 0.5-3.8% (p-tau181) and 0.5-8.6% (p-tau217); LLOQ 0.32 pg/mL (p-tau181) and 0.10 pg/mL (p-tau217) (C10)"
    pdf_location: "paper.pdf p.5, 'Analytical performance / Precision, linearity and limit of quantification'"
    captured_in_ara: true
    note: "Exact verbatim match; claims.md correctly notes the underlying concentration-stratified breakdown lives in Supplemental Table 1 (not provided to compiler) rather than fabricating that detail."
  - fact: "Abstract states only 'p = 0.322' for the Ab42/Ab40-ratio AUC comparison, omitting the p=0.058 value for the Ab42-only comparison, while the Results-section text reports both (0.950 vs 0.957; p=0.058 and p=0.322, respectively) (C05)"
    pdf_location: "paper.pdf Abstract p.1 vs Results p.7"
    captured_in_ara: true
    note: "claims.md C05 correctly sources the more complete/precise Results-section pair of p-values rather than the abbreviated Abstract phrasing -- the ARA used the more informative primary-text source, not the lossy abstract summary."
  - fact: "Discussion (p.6) rounds Elecsys p-tau217 sensitivity/specificity to '92%, specificity 89%' while Table 2 gives the precise 92.2%/89.2% (C01)"
    pdf_location: "paper.pdf p.6 Discussion vs p.6 Table 2"
    captured_in_ara: true
    note: "claims.md and table2.md consistently use the more precise Table 2 figures (92.2%/89.2%) rather than the Discussion's rounded prose figures -- correct source prioritization, no precision loss introduced by the compiler."
