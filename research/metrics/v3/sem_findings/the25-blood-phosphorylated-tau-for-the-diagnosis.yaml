    pdf_location: "research/ara-library/.../PAPER.md frontmatter vs research/data/lib/.../metadata.md"
    captured_in_ara: true
    note: "Not a knowledge-layer loss -- claims.md correctly cites the full metadata.md text independently of PAPER.md's abbreviated convenience copy -- but PAPER.md's own 'abstract' field is not a faithful verbatim reproduction of the true source abstract, which is a minor internal-consistency wrinkle worth noting."
