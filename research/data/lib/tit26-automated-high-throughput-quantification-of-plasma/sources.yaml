notes: >
  Open-access article (gold OA, CC BY-NC-ND) in Alzheimer's Research & Therapy
  (BMC); PMC id PMC13134085. OA PDF downloaded from Springer (1.67 MB, valid
  PDF), URL confirmed via Unpaywall. Data Availability statement (verbatim):
  "The datasets used and/or analysed during the current study are available from
  the corresponding author on reasonable request." No Code Availability
  statement is present, and web search found no associated GitHub/GitLab/OSF/
  Zenodo repository. This is a retrospective single-cohort diagnostic-accuracy
  study of 187 memory-clinic patients from the CCUG biobank (Ghent), classified
  AD vs non-AD by CSF biomarkers — no interventional clinical trial, and no NCT/
  EudraCT registration number is reported. No public dataset accessions
  (GEO/SRA/EGA/PRIDE/Dryad/figshare) are used or released; the only data source
  is the request-access CCUG biobank.
