notes: >
  This is a narrative literature survey (review) of machine/deep learning methods for Alzheimer's
  disease diagnosis. The paper contains no formal Data Availability or Code Availability statement
  and releases no new code, data, or model. It is open access (Bronze OA, publisher AJATES /
  ajates-scholarly.com); the OA PDF was confirmed via Unpaywall and downloaded (595 KB, 28 pages,
  valid %PDF). No GitHub/GitLab/Zenodo/OSF/figshare repository is associated with the paper
  (web search returned none). The datasets listed above (ADNI, OASIS/OASIS-3, AIBL) are public
  benchmark neuroimaging cohorts discussed across the surveyed literature, not datasets released
  by this paper; all require registration/data-use agreements (recorded as access: request).
  The paper also mentions MRI/PET and multimodal clinical data generically. No clinical trial
  (NCT) or systematic-review registration (PROSPERO) is present in the abstract or full text.
  Not indexed in Europe PMC/PubMed.
