notes: >
  Data Availability Statement (verbatim from PDF): "Lilly provides access to all
  individual participant data collected during the trial, after anonymization, with
  the exception of pharmacokinetic or genetic data. Data are available to request 6
  months after the indication studied has been approved in the US and EU and after
  primary publication acceptance... Access is provided after a proposal has been
  approved by an independent review committee... For details on submitting a request,
  see the instructions provided at www.vivli.org." Access type is therefore
  request/controlled via Vivli — no open dataset or public accession is released.
  No Code Availability statement is present; statistical analyses used SAS v9.4 with
  further methodological detail hosted on ClinicalTrials.gov/study/NCT05108922. No
  code/software repository found (expected for an industry-sponsored clinical trial).
  Trial NCT05108922 (TRAILBLAZER-ALZ 4) confirmed via ClinicalTrials.gov: Phase 3,
  open-label, COMPLETED, sponsor Eli Lilly, 148 participants, 31 US sites, has_results=true.
  PDF is open access (CC-BY, hybrid; PMCID PMC12089073, PMID 40390253) and was
  downloaded from Europe PMC / PMC (verified valid 13-page PDF, ~1.2 MB). Publisher
  PDF also available at https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/alz.70293.
