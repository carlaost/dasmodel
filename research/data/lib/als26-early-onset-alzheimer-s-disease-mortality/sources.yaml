notes: >
  Population-based epidemiological study of US mortality trends. Data source is
  CDC WONDER, a publicly available, de-identified mortality database; EOAD deaths
  identified via ICD-10-CM code G30.0, with G30.1 (late-onset AD) used in a
  sensitivity analysis. The publisher (SAGE, Journal of Alzheimer's Disease)
