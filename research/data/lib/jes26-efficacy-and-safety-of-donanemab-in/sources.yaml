notes: >
  Post-hoc analysis of the TRAILBLAZER-ALZ 2 Phase 3 trial (NCT04437511), sponsored by
  Eli Lilly, examining donanemab efficacy/safety in the European (EMA)-eligible population.
  Data availability (from PMC PMC13234467): "Lilly provides access to all individual
  participant data collected during the trial, after anonymization, with the exception of
  pharmacokinetic or genetic data." Data available 6 months after US/EU approval and
  primary publication acceptance, subject to independent review committee approval; requests
  via www.vivli.org (controlled/request access). No code availability statement present and
  no public code repository found (expected for a clinical-trial post-hoc analysis).
  Open access (gold, CC-BY); full 9-page PDF downloaded from Europe PMC render endpoint.
  Verified IDs: PMID 42202469, PMCID PMC13234467, NCT04437511.
