notes: >
  Annual review of the Alzheimer's disease drug development pipeline built entirely from the
  public ClinicalTrials.gov registry (Index Date 2026-01-01): 158 drugs across 192 AD trials.
  DATA AVAILABILITY STATEMENT (verbatim intent): "Data are available in summary form on
  alzpipeline.com. Data will be made available through the AD Workbench of the Gates Ventures'
  Alzheimer's Disease Data Initiative." Raw source data are pulled via the ClinicalTrials.gov API
  into the UNLV Clinical Trial Observatory and Cleveland Clinic Laboratory of Network Medicine
  databases. Consent statement notes all data are from an anonymized publicly available registry;
  no individual participant-level data. No code/software repository is associated with this review
  (none found; expected for a registry-based pipeline analysis). No dedicated primary-research
  dataset or accessions (GEO/SRA/etc.) — the paper is a survey, not an experimental study.
  The article references ~190 NCT numbers across Phase 1-3 tables; recorded here are 8 salient,
  individually verified flagship Phase 3 disease-targeting/repurposed agents (all confirmed on
  ClinicalTrials.gov and present in the paper's tables). PDF is gold OA (CC BY-NC-ND),
  downloaded from Europe PMC (PMC13140253); PMID 42095064.
