clinical_trials: []   # Methods/ML paper on public neuroimaging cohorts; no interventional trial, no NCT id, no PROSPERO registration.

notes: >
  MDPI Diagnostics 2025, Gold OA (CC-BY). PMID 41464136, PMCID PMC12732103.
  Data Availability Statement reads only: "The data presented in this study are openly
  available in [refs 27-37]" — i.e. it points to the six public benchmark cohorts by
  citation rather than to a new release. The six datasets (ADNI, OASIS-3, AIBL, BioFINDER,
  TADPOLE, MIRIAD) are all secondary-use, publicly available but registration/DUA-gated
  (recorded as access: request). The authors state they release site-stratified 5-fold CV
  split files, seeds and preprocessing versions "for reproducibility," but NO repository
  URL is provided in the paper, DAS, or supplement, and none was found via web search —
  so no code/data artifact could be verified. No clinical trial or PROSPERO registration
  (not applicable to this study type). Funding: Prince Sattam Bin Abdulaziz University
  (PSAU/2025/03/33734). PDF verified: 24 pages, %PDF header, matches title/authors.
