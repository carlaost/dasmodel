paper:
  slug: ali25-multimodal-self-supervised-learning-for-early
  doi: 10.3390/diagnostics15243135
  title: "Multimodal Self-Supervised Learning for Early Alzheimer’s: Cross-Modal MRI–PET, Longitudinal Signals, and Site Invariance"

pdf:
  oa: true
  downloaded: true
  path: paper.pdf
  url: https://www.mdpi.com/2075-4418/15/24/3135/pdf
  source: publisher   # OA gold (CC-BY) via MDPI; MDPI/PMC direct downloads were Cloudflare-blocked, obtained identical PDF from Semantic Scholar mirror

code: []   # No code/software repository released. Paper claims it "releases" CV split files and seeds for reproducibility, but no GitHub/GitLab/Zenodo/OSF/Bitbucket URL is given anywhere in the article, data-availability statement, or supplementary material. Web search found none.

data:
  - name: ADNI (Alzheimer's Disease Neuroimaging Initiative)
