notes: >
  Green OA (CC BY-NC-ND); PMID 42189519, PMCID PMC13213595. Full text is freely
  readable as HTML at Europe PMC / PMC, but no rendered PDF is available yet
  (Unpaywall url_for_pdf is null and both PMC and Europe PMC PDF endpoints return
  no file), so downloaded:false. Publisher landing page:
  https://jamanetwork.com/journals/jamaneurology/fullarticle/2849574.
  Data availability: a formal Data Sharing Statement is provided in Supplement 2
  (jamaneurol-e261405-s002.pdf). Data come from two cohorts: BioFINDER-2
  (registered as NCT03174938, the only trial tied to this paper — an observational/
  translational study, phase NA, recruiting, sponsor Skane University Hospital,
  collaborator Lund University) and the independent Knight ADRC cohort at
  Washington University in St Louis. Consistent with BioFINDER policy, cohort data
  are available to qualified researchers on reasonable request (controlled/request
  access, not open deposit). No code/software repository (GitHub/GitLab/Zenodo/OSF)
  was found for this paper; analyses used mass-spectrometry plasma biomarkers and
  standard statistical modeling with no released code.
