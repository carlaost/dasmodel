notes: >
  Network meta-analysis (18 studies, 24 independent datasets, 4,736 participants) published
  in Frontiers in Aging Neuroscience; gold OA, CC-BY. Data Availability statement (verbatim):
  "The original contributions presented in the study are included in the article/Supplementary
  material, further inquiries can be directed to the corresponding author." No code availability
  statement and no code/software repository (GitHub/GitLab/Zenodo/OSF/Dryad) is mentioned or found.
  Prospectively registered on PROSPERO as CRD420261327845 (given in the abstract). No primary
  dataset was released; the analysis reuses summary diagnostic-accuracy data (AUCs) extracted from
  the included primary studies, which drew on established AD cohorts (BioFINDER, ADNI, TRIAD, WRAP,
  ALFA+, MCSA, Huashan, Greater Bay Area, SPIN, Coimbra) - access to those underlying cohorts is
  controlled/by-request via their respective consortia. No clinical trial NCT identifiers are
  reported in the abstract or article text; none recorded. Verified via Unpaywall (is_oa true,
  gold), Europe PMC (PMID 42318558, PMCID PMC13272307), and the Frontiers full-text page. PDF
  downloaded from the Frontiers publisher endpoint (PMC PDF endpoint returned an HTML block page).
