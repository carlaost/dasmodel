notes: >
  Population-level epidemiological study of Alzheimer disease-related mortality using
  the publicly available CDC WONDER Multiple Cause of Death database. Deaths were
  identified by ICD-10 codes (F01, F03, G30, G31.1) among individuals aged 45+ for
  1999-2020, with joinpoint regression for trend analysis. No study-specific dataset,
  accession, or code repository was released or referenced. No clinical trial (this is
  a registry/database analysis, not an interventional study). The article is paywalled
  (Ovid/Wolters Kluwer); Unpaywall reports oa_status "closed" and Europe PMC finds no
  PMC/EPMC full text, so no licit open-access PDF is available. PMID 41773884.
  The underlying CDC WONDER data are open/public. No explicit Data Availability or Code
  Availability statement could be retrieved because the full text is behind a paywall.
