notes: >
  Data Availability (verified via PMC12917852): "The anonymized data that support the
  findings of this study are available on request from qualified academic investigators,
  after approval of a proposal and with a signed data access agreement." Requests go to the
  corresponding author (a.keshavan@ucl.ac.uk); access is controlled/on-request.
  No Code Availability statement exists and no GitHub/GitLab/Zenodo/OSF repository could be
  found (verified via publisher page, PMC, and web search) — none appears to exist.
  No NCT/ISRCTN registration number is stated in the paper (confirmed by scanning the full
  PDF text). This is ADAPT "stage 1", an observational biomarker-validation study (not itself
  a registered trial): plasma p-tau217 measured with Lumipulse (Fujirebio) and ALZpath
  (Quanterix) assays against CSF (n=257) and amyloid-PET (n=76) reference cohorts.
  The paper describes a planned ADAPT stage 3 randomised controlled trial (disclosure of
  p-tau217 results in ~1,100 UK memory-clinic patients across ~20 NHS centres, first site
  Essex Partnership University NHS FT, recruitment from Aug 2025). That RCT is part of the
  same ADAPT programme but is a separate future study; no verified NCT/ISRCTN identifier
  is cited in this paper, so no clinical trial is recorded here.
  Funding: Alzheimer's Research UK / Blood Biomarker Challenge grant ARUK-BBC2023-002.
  IDs: PMID 41711262, PMCID PMC12917852; medRxiv preprint 10.1101/2025.09.08.25335317.
