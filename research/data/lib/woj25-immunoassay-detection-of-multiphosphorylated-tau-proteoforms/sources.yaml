  The raw data are provided in the Source Data file and Supplementary Information file.
  Any other blinded anonymized data is available on request from the corresponding
  authors." No dedicated Code availability section and no code/software repository
  (GitHub/GitLab/Zenodo/OSF) found or referenced — verified via full-text and web
  search; reporting none is correct. No external dataset accessions (no
  GEO/SRA/PRIDE/ProteomeXchange/EGA/Dryad/figshare/Zenodo). Study uses in-house
  patient cohorts (CSF and plasma across the AD continuum and FTD) — not a public
  cohort like ADNI/BioFINDER — with anonymized data available on request subject to
  EU data-protection review. No clinical trial registration (no NCT) is associated
  with this observational biomarker study. Grants: Parkinson's Foundation
  PF-PRF-934916; EU Horizon 2020 grant 860197.
