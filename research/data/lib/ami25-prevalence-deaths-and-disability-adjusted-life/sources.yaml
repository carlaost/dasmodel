notes: >
  Secondary analysis of Global Burden of Disease (GBD) Study 2021 estimates for
  Alzheimer's disease and other dementias in the MENA region, 1990-2021. Data
  Availability statement (confirmed via PMC PMC11868542): "The data used for
  these analyses are all publicly available at http://ghdx.healthdata.org/gbd-results-tool."
  No code availability statement is provided; no GitHub/Zenodo/OSF repository or
  accession numbers exist. No clinical trial or PROSPERO registration (this is an
  epidemiological modeling study, not a trial or systematic review). Open access
  under CC BY-NC-ND via Springer Nature; PDF downloaded from publisher (2.8 MB,
  valid PDF). PMID 40016362, PMCID PMC11868542. Funded by grant 43010066 from
  Shahid Beheshti University of Medical Sciences.
