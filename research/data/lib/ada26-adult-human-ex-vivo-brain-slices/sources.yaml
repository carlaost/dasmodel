    host: github
    verified: true
    note: >
      Naomi Habib lab (corresponding author) repo. README titled exactly
      "Adult human ex vivo brain slices for dissecting glial biology and
      multicellular communication" and states it contains the analysis
      scripts used to process the bulk RNA-seq and snRNA-seq data and
      generate the manuscript figures (WGCNA across TNFα/LPS/H2O2/BLM/control,
      cell-type-specific TNFα snRNA-seq DE, external-dataset validation,
      MultiNicheNet cell-cell communication). R-only; also bundles
      Supplementary Tables 1-5 (.xlsx) under data/. No data accession in repo.

data:
  - name: Adult human organotypic brain slice bulk RNA-seq and snRNA-seq (generated in this study)
