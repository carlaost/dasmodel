# §-section pointers into the source PDF (no in-repo evidence/*.md path is cited in any Sources
# line for this ARA), so string_present is judged on plausibility of genuine PDF-extracted text
# (mid-token spacing artifacts like "Sp 9 D 8", "Figure 5A ," are a strong tell of real OCR/text-layer
# extraction rather than paraphrase) rather than an in-repo re-open. No local paper.pdf was available
# under research/data/lib/<slug>/ to mechanically re-verify.
