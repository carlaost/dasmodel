tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["Abstract", "§1 Introduction", "§2.1"]
    title: "What are donanemab's efficacy and safety in the EU-eligible population?"
    description: >
      Central question: donanemab is EU-approved only for APOE ε4 non-carriers/heterozygotes,
      with further clinical contraindications (superficial siderosis, anticoagulant use,
      uncontrolled hypertension). The pivotal trial did not isolate this EU-eligible subgroup, so
      efficacy and safety for the population actually treated in Europe are re-estimated post-hoc.
    children:
      - id: N02
        type: decision
        support_level: explicit
        source_refs: ["§2.1", "§2.2"]
        title: "Define the EU-eligible subpopulation of TRAILBLAZER-ALZ 2"
        description: >
          Restrict the randomised trial dataset to APOE ε4 non-homozygotes minus baseline
          superficial siderosis, anticoagulant use, or uncontrolled hypertension (seated SBP ≥140,
          DBP ≥90 mmHg). Placebo N=604, donanemab N=614.
        children:
          - id: N03
            type: decision
            support_level: explicit
            source_refs: ["§1", "§2.2", "Table 2"]
            title: "Adopt the EMA-required conservative hybrid J2R/CIR imputation"
            description: >
              Handle missing values with jump-to-reference (serious/severe/symptomatic ARIA or
              death) and copy increment reference (all other causes); also run the original
              no-imputation methodology for comparison.
            children:
              - id: N04
                type: experiment
                support_level: explicit
                source_refs: ["§3.1.2.1", "Fig. 1", "Table 2"]
                title: "MMRM clinical-scale efficacy at 76 weeks"
                description: "iADRS, CDR-SB (+6 domains), ADAS-Cog13, ADCS-iADL, MMSE via MMRM."
                evidence: [C01, C02, C04, C10]
              - id: N05
                type: experiment
                support_level: explicit
                source_refs: ["§3.1.2.1.2", "Table 3"]
                title: "Cox proportional hazards progression risk (CDR-G)"
                description: "Next-stage progression and progression to CDR-G ≥2."
                evidence: [C03]
              - id: N06
                type: experiment
                support_level: explicit
                source_refs: ["§3.1.2.1.3", "Table 3"]
                title: "Disease stabilisation (no CDR-SB progression) at 52/76 weeks"
                description: "Generalized mixed model for proportion with CDR-SB CFB ≤0."
                evidence: [C05]
              - id: N07
                type: experiment
                support_level: explicit
                source_refs: ["§3.1.2.1.4", "Fig. 2"]
                title: "Time-saved analysis (CDR-SB time-progression model)"
                description: "Overall and low-medium tau EU-eligible subpopulations."
                evidence: [C06]
              - id: N08
                type: experiment
                support_level: explicit
                source_refs: ["§3.1.2.2", "Table 3"]
                title: "Biomarker analyses (amyloid PET, clearance, P-tau217)"
                description: "Amyloid CFB, amyloid clearance <24.1 CL at weeks 24/52/76, plasma P-tau217."
                evidence: [C07]
      - id: N09
        type: experiment
        support_level: explicit
        source_refs: ["§3.1.3", "§4", "Table 4"]
        title: "Descriptive safety analysis in the EU-eligible population"
        description: >
          Tabulate TEAEs, deaths, SAEs, discontinuations, ARIA-E/H by seriousness/symptomatic
          status/radiographic severity, IRR; compare any-ARIA rate to the overall population.
        evidence: [C08]
      - id: N10
        type: experiment
        support_level: explicit
        source_refs: ["§4", "Abstract"]
        title: "LTE efficacy vs propensity-weighted ADNI external control (154 weeks)"
        description: >
          Non-carrier/heterozygote LTE analysis; increasing treatment effect over 154 weeks and
          early-start vs delayed-start progression comparison. Full data in Supplement/Zimmer [7].
        evidence: [C09]
        children:
          - id: N11
            type: dead_end
            support_level: explicit
            source_refs: ["§2.2"]
            title: "EU-eligible LTE external control not feasible"
            description: >
              Superficial siderosis, anticoagulant use, and blood pressure were not collected in
              ADNI, so an EU-eligible propensity-weighted control could not be built; LTE analyses
              used the non-homozygote population instead.
          - id: N12
            type: dead_end
            support_level: explicit
            source_refs: ["§2.2"]
            title: "Hybrid imputation not applicable to LTE"
            description: >
              Simultaneous propensity score reweighting and J2R/CIR multiple imputation is not
              methodologically possible, so hybrid imputation was not applied to any LTE analysis.
      - id: N13
        type: experiment
        support_level: explicit
        source_refs: ["§4", "Table 2"]
        title: "Robustness: imputation-method and overall-population consistency"
        description: >
          Compare conservative vs original methodology and EU-eligible vs overall-population
          CDR-SB slowing (28.2% with / 30.8% without vs 28.9% overall).
        evidence: [C10]
      - id: N14
        type: decision
        support_level: explicit
        source_refs: ["§4 (Discussion)"]
        title: "Interpret wide clinical-scale range against the relevant band"
        description: >
          Because most EU-eligible participants clustered in a ~36-point iADRS band (85–121),
          percent slowing is interpreted against the relevant range, not the full 0–144 scale.
