# RC7 semantic grounding findings (frozen [sem] pass) for jes26-efficacy-and-safety-of-donanemab-in.
# One entry per «quote» occurrence in logic/claims.md Sources blocks. All 23 quotes were checked
# against `research/data/lib/jes26-efficacy-and-safety-of-donanemab-in/paper.pdf` (extracted via
# pdftotext -layout, cross-referenced against evidence/tables/*.md and evidence/figures/*.md). This
# is a well-behaved compilation: essentially every quote is a verbatim (or near-verbatim,
# minus-sign/OCR-hyphen-level) extraction from the source text or tables. The one notable issue is
# outside these quotes entirely: claims.md C09's Statement contains an added clause ("amyloid
# clearance was maintained after treatment completion") with no corresponding Sources quote, which
# mischaracterizes the paper's actual Discussion text (amyloid reaccumulates post-treatment at a
# natural pace) -- flagged in sem_findings.yaml, not reproducible here since no quote exists for it.

