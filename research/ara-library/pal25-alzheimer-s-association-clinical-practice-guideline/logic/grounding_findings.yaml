# [sem] grounding findings for pal25-alzheimer-s-association-clinical-practice-guideline.
# One entry per «quote» occurrence in logic/claims.md Sources blocks. All quotes were checked
# against the local paper.pdf (research/data/lib/pal25-.../paper.pdf) via pdftotext -layout —
# a real in-repo PDF was available for this ARA (unlike some others), so string_present here
# reflects an actual re-open/re-extraction, not a plausibility judgment.

