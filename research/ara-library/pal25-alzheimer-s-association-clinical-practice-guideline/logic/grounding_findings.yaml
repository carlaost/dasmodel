- claim_id: C06
  number: "triage PPV 47/78/94%, NPV 97/88/65%"
  quote: "a test with a Sn of 90% and Sp of 75% (our \"triage\" thresholds) would have a PPV of 47%, 78%, or 94%, and NPV of 97%, 88%, 65%, when applied in a population with a pretest probability of 20%, 50%, or 80%, respectively"
  source: "paper.pdf §2.5.1"
  string_present: true
  verdict: supports
  value_match: exact
  polarity_ok: true
  context_match: true
  note: "Exact match; also independently reproduced via Bayes' theorem from Sn=90%/Sp=75% at prevalence 20/50/80% (computed PPV=47.4/78.3/93.5%, NPV=96.8/88.2/65.2%), confirming these are internally consistent, correctly-rounded figures and not transcription errors."

