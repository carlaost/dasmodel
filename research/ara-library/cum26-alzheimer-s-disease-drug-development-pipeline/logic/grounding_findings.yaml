- claim_id: C10
  number: "inflammation 6%->~20%; tau 6%->~20%; amyloid 33%->~20%"
  quote: "the percentage of the pipeline devoted to inflammation/immune dysfunction drugs has increased from 6% to approximately 20%, tau targeted agents have increased from 6% to approximately 20%, and amyloid targeted agents have decreased from 33% to approximately 20% of the pipeline (Figure 5B)."
  source: "paper.pdf §3.5"
  string_present: true
  verdict: supports
  value_match: rounded
  polarity_ok: true
  context_match: false
  note: "The quoted TEXT supports the Statement's numbers exactly, so verdict=supports/value_match=rounded on the text itself. But context_match is marked false because evidence/README.md documents that the cited Figure 5B (also named in this same source line) visually shows the tau curve ending near ~9%, not ~20% -- i.e. the two artifacts this single citation points to (text and figure) disagree on the tau endpoint. This is a genuine paper-internal inconsistency the ARA discloses rather than the compiler's fabrication; flagged here as the reason context_match fails for this one item."
