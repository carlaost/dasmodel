# Exploration Tree — ols25-microglial-mechanisms-drive-amyloid-clearance-in
# Research DAG: nested tree with cross-edges (also_depends_on) forming a DAG.
# Node types: question | experiment | dead_end | decision | pivot
#
# GROUNDING: abstract-only. No full text, figures, tables, or supplements were provided.
# Nodes are limited to research steps explicitly stated or directly implied by the abstract.
