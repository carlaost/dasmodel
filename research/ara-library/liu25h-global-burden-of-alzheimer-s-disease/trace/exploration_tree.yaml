                type: experiment
                support_level: explicit
                source_refs: ["metadata.md:13"]
                title: "Conduct frontier analysis across 204 countries"
                result: "Most countries had burden higher than the minimum disease burden associated with their SDI."
                evidence: [C03, C05]

              - id: N06
                type: experiment
                support_level: explicit
                source_refs: ["metadata.md:13"]
                title: "Quantify inequality in age-standardized DALYs"
                result: "DALYs increased with SDI overall, while the burden was primarily concentrated in lower-SDI populations."
                evidence: [C04, C05]

      - id: N07
        type: pivot
        support_level: explicit
        source_refs: ["metadata.md:13"]
        title: "From burden estimation to healthcare strategy relevance"
        from: "Quantifying dementia burden in older adults"
        to: "Using burden evidence to help areas and countries adjust healthcare strategies"
        trigger: "The abstract states that quantifying elderly dementia burden can provide scientific data for healthcare strategy adjustment."
