        type: decision
        support_level: explicit
        source_refs: ["metadata.md:13"]
        title: "Analyze GBD 2021 burden among adults aged 65 and older"
        choice: "Use GBD 2021 data for Alzheimer's disease and other dementias among individuals aged 65+ over 1990-2021"
        alternatives:
          - "Not available from provided input"
        evidence: [C01]
        children:

          - id: N03
            type: experiment
            support_level: explicit
            source_refs: ["metadata.md:13"]
            title: "Estimate global trends in age-standardized DALYs and mortality"
            result: "Global age-standardized DALYs and mortality rates declined over time."
            evidence: [C01, C06]

          - id: N04
            type: experiment
            support_level: explicit
            source_refs: ["metadata.md:13"]
            title: "Relate mortality rates and DALYs to SDI"
            result: "Dementia burden was significantly associated with SDI, with high-SDI countries showing higher baseline burden than low-SDI countries."
