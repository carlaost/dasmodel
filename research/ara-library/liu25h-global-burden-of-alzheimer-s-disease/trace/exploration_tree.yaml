    support_level: explicit
    source_refs: ["metadata.md:13"]
    title: "What is the global burden and SDI-related inequality of dementia in adults aged 65+?"
    description: >
      The abstract frames dementia burden in older adults as a public-health issue and analyzes
      Alzheimer's disease and other dementias among individuals aged 65 and older from 1990 to 2021.
    evidence: [C01, C02, C03, C04, C05, C06]
    children:

